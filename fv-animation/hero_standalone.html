<script>
(function(){
  function hidePlaybackBar(){
    var resetBtn=document.querySelector('button[title="Return to start (0)"]');
    var playBtn=document.querySelector('button[title="Play/pause (space)"]');
    var bar=(resetBtn&&resetBtn.parentElement)||(playBtn&&playBtn.parentElement);
    if(bar){bar.style.display="none";}
  }
  function scrubDarkBackgrounds(){
    // Disable background scrub as it transparency-fades the black calculator screen backgrounds and makes button white-text invisible on white parent backgrounds.
  }
  function refreshTweaks(){hidePlaybackBar();scrubDarkBackgrounds();}
  refreshTweaks();
  window.addEventListener("load",refreshTweaks);
  requestAnimationFrame(refreshTweaks);
  setTimeout(refreshTweaks,120);
  setTimeout(refreshTweaks,300);
  setTimeout(refreshTweaks,700);
  setTimeout(refreshTweaks,1200);
  setTimeout(refreshTweaks,2000);
})();
</script>

<script type="text/babel">
// ── Core Animation Framework ──
const Easing = {
  easeInCubic:  (t) => t * t * t,
  easeOutCubic: (t) => (--t) * t * t + 1,
};

const clamp = (v, min, max) => Math.max(min, Math.min(max, v));
const PLAYBACK_RATE = 1.5;
const PULSE_COUNT = 3;
const SCENE_TRIM_SECONDS = 0.2;
const SCENE_TRIM_THRESHOLDS = [9.3, 11.3, 18.0, 27.5, 32.0, 38.6, 44.8, 51.8];
const EXTRA_SCENE_TRIM_SECONDS = 0.2;
const EXTRA_SCENE_TRIM_THRESHOLDS = [9.3, 11.3, 18.0, 27.5, 44.8, 51.8, 52.8];
const SELECTIVE_SCENE_TRIM_SECONDS = 0.4;
const SELECTIVE_SCENE_TRIM_THRESHOLDS = [9.3, 27.5];
const IOS_HOME_LEAD_TRIM_SECONDS = 0.3;
const IOS_HOME_LEAD_TRIM_THRESHOLD = 11.3;
const trimTimelineTime = (seconds) => {
  let adjusted = seconds;
  for (const threshold of SCENE_TRIM_THRESHOLDS) {
    if (seconds >= threshold) adjusted -= SCENE_TRIM_SECONDS;
  }
  for (const threshold of EXTRA_SCENE_TRIM_THRESHOLDS) {
    if (seconds >= threshold) adjusted -= EXTRA_SCENE_TRIM_SECONDS;
  }
  for (const threshold of SELECTIVE_SCENE_TRIM_THRESHOLDS) {
    if (seconds >= threshold) adjusted -= SELECTIVE_SCENE_TRIM_SECONDS;
  }
  if (seconds >= IOS_HOME_LEAD_TRIM_THRESHOLD) adjusted -= IOS_HOME_LEAD_TRIM_SECONDS;
  return adjusted;
};
const scaleTime = (seconds) => trimTimelineTime(seconds) / PLAYBACK_RATE;
const PULSE_DURATION = 1.45 * (PULSE_COUNT / 2);
const IOS_PULSE_START = 0.0;
const IOS_PULSE_SPEED = 3.35;
const ANDROID_PULSE_START = 0.215;
const ANDROID_PULSE_SPEED = 3.1;

const TimelineContext = React.createContext({ time: 0, duration: 10, playing: false });
const useTime = () => React.useContext(TimelineContext).time;
const useTimeline = () => React.useContext(TimelineContext);

function Stage({
  width = 1280,
  height = 720,
  duration = 10,
  background = '#f6f4ef',
  loop = true,
  autoplay = true,
  persistKey = 'animstage',
  children,
}) {
  const [time, setTime] = React.useState(() => {
    try {
      const v = parseFloat(localStorage.getItem(persistKey + ':t') || '0');
      return isFinite(v) ? clamp(v, 0, duration) : 0;
    } catch { return 0; }
  });
  const [playing, setPlaying] = React.useState(autoplay);
  const [scale, setScale] = React.useState(1);

  const stageRef = React.useRef(null);
  const canvasRef = React.useRef(null);
  const rafRef = React.useRef(null);
  const lastTsRef = React.useRef(null);

  React.useEffect(() => {
    try { localStorage.setItem(persistKey + ':t', String(time)); } catch {}
  }, [time, persistKey]);

  React.useEffect(() => {
    if (!stageRef.current) return;
    const el = stageRef.current;
    const measure = () => {
      const s = Math.min(el.clientWidth / width, el.clientHeight / height);
      setScale(Math.max(0.05, s));
    };
    measure();
    const ro = new ResizeObserver(measure);
    ro.observe(el);
    window.addEventListener('resize', measure);
    return () => {
      ro.disconnect();
      window.removeEventListener('resize', measure);
    };
  }, [width, height]);

  React.useEffect(() => {
    if (!playing) {
      lastTsRef.current = null;
      return;
    }
    const step = (ts) => {
      if (lastTsRef.current == null) lastTsRef.current = ts;
      const dt = (ts - lastTsRef.current) / 1000;
      lastTsRef.current = ts;
      setTime((t) => {
        let next = t + dt;
        if (next >= duration) {
          if (loop) next = next % duration;
          else { next = duration; setPlaying(false); }
        }
        return next;
      });
      rafRef.current = requestAnimationFrame(step);
    };
    rafRef.current = requestAnimationFrame(step);
    return () => {
      if (rafRef.current) cancelAnimationFrame(rafRef.current);
      lastTsRef.current = null;
    };
  }, [playing, duration, loop]);

  const ctxValue = React.useMemo(
    () => ({ time, duration, playing, setTime, setPlaying }),
    [time, duration, playing]
  );

  return (
    <div
      ref={stageRef}
      style={{
        position: 'absolute', inset: 0,
        display: 'flex', flexDirection: 'column',
        alignItems: 'center',
        background: 'transparent',
      }}
    >
      <div style={{
        flex: 1,
        width: '100%',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        overflow: 'hidden',
        minHeight: 0,
      }}>
        <div
          ref={canvasRef}
          style={{
            width, height,
            background,
            position: 'relative',
            transform: `scale(${scale})`,
            transformOrigin: 'center',
            flexShrink: 0,
            overflow: 'hidden',
          }}
        >
          <TimelineContext.Provider value={ctxValue}>
            {children}
            <DevControls />
          </TimelineContext.Provider>
        </div>
      </div>
    </div>
  );
}

function DevControls() {
  const { time, duration, playing, setTime, setPlaying } = useTimeline();
  const [visible, setVisible] = React.useState(() => window.self === window.top);

  React.useEffect(() => {
    setVisible(window.self === window.top);
  }, []);

  if (!visible) return null;

  return (
    <div style={{
      position: 'absolute',
      left: 12,
      right: 12,
      bottom: 12,
      zIndex: 999,
      display: 'flex',
      alignItems: 'center',

      background: 'rgba(15, 15, 18, 0.78)',
      backdropFilter: 'blur(8px)',

      color: '#fff',
      fontFamily: '"SF Pro Display", system-ui, sans-serif',
    }}>
      <button
        type="button"
        onClick={() => setPlaying(!playing)}
        style={devButtonStyle}
      >
        {playing ? 'Pause' : 'Play'}
      </button>
      <button
        type="button"
        onClick={() => {
          setTime(0);
          setPlaying(false);
        }}
        style={devButtonStyle}
      >
        Reset
      </button>
      <input
        type="range"
        min="0"
        max={duration}
        step="0.01"
        value={time}
        onChange={(e) => setTime(parseFloat(e.target.value))}
        style={{ flex: 1 }}
      />

        minWidth: 84,
        textAlign: 'right',
        fontSize: 12,
        fontVariantNumeric: 'tabular-nums',
        opacity: 0.9,
      }}>
        {time.toFixed(1)} / {duration.toFixed(1)}s
      </div>
    </div>
  );
}

// ── scenes/calc-screen.jsx ──
const CALC_KEYS = [
  ['⌫', 'AC', '%', '÷'],
  ['7', '8', '9', '×'],
  ['4', '5', '6', '−'],
  ['1', '2', '3', '+'],
  ['+/−', '0', '·', '='],
];

function CalcKey({ label, isOp, active, highlight, scale = 1, subtle = false }) {
  const buttonSize = 52;

  const isOrange = ['÷', '×', '−', '+', '='].includes(label);
  const isLightGray = ['AC', 'C', '⌫', '+/−', '+/-', '%'].includes(label);

  let baseBg = '#333333';
  let baseColor = '#ffffff';

  if (isOrange) {
    baseBg = '#ff9f0a';
    baseColor = '#ffffff';
  } else if (isLightGray) {
    baseBg = '#a5a5a5';
    baseColor = '#000000';
  }

  if (active || highlight) {
    if (isOrange) {
      baseBg = '#f2c179';
    } else if (isLightGray) {
      baseBg = '#e5e5e5';
    } else {
      baseBg = '#737373';
    }
  }

  let fontSize = 20;
  if (label === 'AC') {
    fontSize = 16;
  } else if (label === '+/−' || label === '+/-') {
    fontSize = 14;
  } else if (label === '⌫') {
    fontSize = 18;
  }

  return (
    <div style={{
      width: buttonSize, height: buttonSize,
      borderRadius: '50%',
      background: baseBg,
      color: baseColor,
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      fontFamily: '"SF Pro Display", -apple-system, system-ui, sans-serif',
      fontSize: fontSize,
      fontWeight: 500,
      transform: `scale(${scale})`,
      opacity: subtle ? 0.55 : 1,
      transition: 'background 80ms linear',
    }}>
      {label}
    </div>
  );
}

      }}>
        {CALC_KEYS.flat().map((k, i) => {
          const isOp = ['⌫', 'AC', '%', '÷', '×', '−', '+', '='].includes(k);
          const active = activeKey === k;
          const highlight = (k === 'AC' && acHighlight);
          return (
            <CalcKey
              key={i}
              label={k}
              isOp={isOp}
              active={active}
              highlight={highlight}
              scale={active ? 0.92 : 1}
            />
          );
        })}
      </div>
    </div>
  );
}

function TapHighlight({ x, y, size = 68, progress = 0 }) {
  const ringBorder = '5px solid rgba(0,102,235,0.98)';
  const ringShadow = '0 0 22px rgba(0,102,235,0.62)';
  const pulseSpan = 1 / PULSE_COUNT;
  const pulseProgresses = Array.from({ length: PULSE_COUNT }, (_, index) => {
    const start = index * pulseSpan;
    const end = start + pulseSpan;
    if (progress < start || progress >= end) return null;
    return (progress - start) / pulseSpan;
  });
  
  return (
    <>
      {pulseProgresses.map((pulseProgress, index) => pulseProgress == null ? null : (
        <div key={index} style={{
          position: 'absolute',
          left: x, top: y,
          width: size, height: size,
          marginLeft: -size / 2, marginTop: -size / 2,
          borderRadius: '50%',
          border: ringBorder,
          boxShadow: ringShadow,
          transform: `scale(${0.8 + pulseProgress * 0.9})`,
          opacity: 1 - pulseProgress,
          pointerEvents: 'none',
        }}/>
      ))}
    </>
  );
}

function Caption({ text, accent = false, time = 0, start = 0, end = 0 }) {
  const duration = end - start;
  const localTime = Math.max(0, time - start);
  const inDur = 0.35;
  const outDur = 0.35;
  const exitStart = duration - outDur;
  let opacity = 1, ty = 0;
  if (localTime < inDur) {
    const t = Easing.easeOutCubic(clamp(localTime / inDur, 0, 1));
    opacity = t; ty = (1 - t) * 14;
  } else if (localTime > exitStart) {
    const t = Easing.easeInCubic(clamp((localTime - exitStart) / outDur, 0, 1));
    opacity = 1 - t; ty = -t * 8;
  }
  return (
    <div style={{
      opacity,
      transform: `translateY(${ty}px)`,
      textAlign: 'center',
      fontFamily: '"Hiragino Sans", "Noto Sans JP", "SF Pro Display", system-ui, sans-serif',
      fontWeight: 700,
      fontSize: 20,
      letterSpacing: '0.02em',
      color: '#fff',
      lineHeight: 1.3,
      background: 'rgba(0,0,0,0.7)',
      padding: '6px 12px',
      borderRadius: '8px',
      display: 'inline-block',
      maxWidth: '94%',
      wordBreak: 'break-all',
    }}>
      {text}
    </div>
  );
}

// ── scenes/timeline.jsx ──
const T = {
  S0: [scaleTime(0.0), scaleTime(3.0)],
  S1: [scaleTime(3.0), scaleTime(9.3)],
  S2: [scaleTime(9.3), scaleTime(11.3)],
  S3: [scaleTime(11.3), scaleTime(16.8)],
  S5: [scaleTime(16.8), scaleTime(26.3)],
  S6: [scaleTime(26.3), scaleTime(30.8)],
  S7: [scaleTime(30.8), scaleTime(37.4)],
  S8: [scaleTime(37.4), scaleTime(43.6)],
  S9: [scaleTime(43.6), scaleTime(50.6)],
  S10: [scaleTime(50.6), scaleTime(51.6)],
};

function inSeg(time, [a, b]) { return time >= a && time < b; }
function localProgress(time, [a, b]) {
  return Math.max(0, Math.min(1, (time - a) / (b - a)));
}

function fadeOutNearEnd(progress, fadeWindow = 0.08) {
  if (progress <= 1 - fadeWindow) return 1;
  return clamp((1 - progress) / fadeWindow, 0, 1);
}

function fadeInAtStart(progress, fadeWindow = 0.08) {
  if (progress >= fadeWindow) return 1;
  return clamp(progress / fadeWindow, 0, 1);
}

const CALC_TAPS = [
  { t: scaleTime(19.80), key: 'AC' },
  { t: scaleTime(20.60), key: 'AC' },
  { t: scaleTime(21.40), key: 'AC' },
  { t: scaleTime(22.70), key: '1' },
  { t: scaleTime(23.30), key: '2' },
  { t: scaleTime(23.90), key: '3' },
  { t: scaleTime(24.50), key: '4' },
];

function activeKeyAt(time, dur = 0.22) {
  for (const tap of CALC_TAPS) {
    if (time >= tap.t && time < tap.t + dur) return tap.key;
  }
  return null;
}

function calcDisplay(time) {
  if (time < scaleTime(22.70)) return '0';
  if (time < scaleTime(23.30)) return '1';
  if (time < scaleTime(23.90)) return '12';
  if (time < scaleTime(24.50)) return '123';
  return '1234';
}

}

function SmamoTimeline() {
  const time = useTime();

  const inS0 = inSeg(time, T.S0);
  const inS1 = inSeg(time, T.S1);
  const inS2 = inSeg(time, T.S2);
  const inS3 = inSeg(time, T.S3);
  const inS5 = inSeg(time, T.S5);
  const inS6 = inSeg(time, T.S6);
  const inS7 = inSeg(time, T.S7);
  const inS8 = inSeg(time, T.S8);
  const inS9 = inSeg(time, T.S9);
  const inS10 = inSeg(time, T.S10);

  const p0 = localProgress(time, T.S0);
  const p1 = localProgress(time, T.S1);
  const p2 = localProgress(time, T.S2);
  const p3 = localProgress(time, T.S3);
  const p5 = localProgress(time, T.S5);
  const p6 = localProgress(time, T.S6);
  const p7 = localProgress(time, T.S7);
  const p8 = localProgress(time, T.S8);
  const p10 = localProgress(time, T.S10);

  let openingOpacity = 0, openingScale = 1;
  if (inS0 || inS10) {
    openingOpacity = inS0 ? fadeOutNearEnd(p0, 0.14) : 1;
    openingScale = 1;
  }

  let privateLineOpacity = 0, privateLineScale = 1;
  if (inS1) {
    privateLineOpacity = fadeInAtStart(p1, 0.08);
    privateLineScale = 1;
  } else if (inS2 && p2 < 0.10) {
    privateLineOpacity = 1;
    privateLineScale = 1;
  } else if (inS2) {
    privateLineOpacity = 0;
    privateLineScale = 1;
  }

  let iosHomeOpacity = 0, iosHomeScale = 1;
  if (inS2) {
    if (p2 < 0.10) {
      const t = p2 / 0.10;
      iosHomeOpacity = t;
      iosHomeScale = 0.92 + t * 0.08;
    } else {
      iosHomeOpacity = 1;
      iosHomeScale = 1;
    }
  } else if (inS3) {
    iosHomeOpacity = 1;
    iosHomeScale = 1;
  } else if (inS5 && p5 < 0.021) {
    iosHomeOpacity = 1;
    iosHomeScale = 1;
  }

  let calcOpacity = 0, calcScale = 1;
  if (inS5) {
    if (p5 < 0.021) {
      const t = p5 / 0.021;
      calcOpacity = t;
      calcScale = 0.92 + t * 0.08;
    } else {
      calcOpacity = 1;
      calcScale = 1;
    }
  } else if (inS6 && p6 < 0.033) {
    calcOpacity = 1;
    calcScale = 1;
  }

  let splashOpacity = 0, splashScale = 1;
  if (inS6) {
    if (p6 < 0.033) {
      const t = p6 / 0.033;
      splashOpacity = t;
      splashScale = 0.92 + t * 0.08;
    } else {
      splashOpacity = 1;
      splashScale = 1;
    }
  }

  let devicesOpacity = 0, devicesScale = 1;
  if (inS6 && p6 > 0.967) {
    const t = (p6 - 0.967) / 0.033;
    devicesOpacity = t;
    devicesScale = 0.92 + t * 0.08;
  } else if (inS7) {
    devicesOpacity = 1;
    devicesScale = 1;
  } else if (inS8 && p8 < 0.032) {
    devicesOpacity = 1;
    devicesScale = 1;
  }

  let androidOpacity = 0, androidReveal = 1, androidScale = 1;
  if (inS8) {
    if (p8 < 0.016) {
      const t = p8 / 0.016;
      androidOpacity = t;
      androidScale = 0.92 + t * 0.08;
    } else {
      androidOpacity = 1;
      androidScale = 1;
    }
    androidReveal = 1;
  }

  let workLineOpacity = 0, workLineScale = 1;
  if (inS8 && p8 > 0.968) {
    const t = (p8 - 0.968) / 0.032;
    workLineOpacity = t;
    workLineScale = 0.92 + t * 0.08;
  } else if (inS9) {
    workLineOpacity = 1;
    workLineScale = 1;
  }

  const iosPulseEnd = IOS_PULSE_START + (PULSE_DURATION / IOS_PULSE_SPEED);
  const iosTapping = inS3 && p3 > IOS_PULSE_START && p3 < iosPulseEnd;
  const iosTapRelativeTime = iosTapping ? (p3 - IOS_PULSE_START) * IOS_PULSE_SPEED : 0;
  const iosTapProgress = iosTapping ? clamp(iosTapRelativeTime / PULSE_DURATION, 0, 1) : 0;

  const deviceSelectedIdx = inS7 && p7 > 0.72 && p7 < 0.96 ? 0 : -1;
  const deviceSelectProgress = inS7
    ? Math.min(1, Math.max(0, (p7 - 0.72) / 0.24))
    : 0;

  const androidPulseEnd = ANDROID_PULSE_START + (PULSE_DURATION / ANDROID_PULSE_SPEED);
  const androidTapping = inS8 && p8 > ANDROID_PULSE_START && p8 < androidPulseEnd;
  const androidTapRelativeTime = androidTapping ? (p8 - ANDROID_PULSE_START) * ANDROID_PULSE_SPEED : 0;
  const androidTapProgress = androidTapping ? clamp(androidTapRelativeTime / PULSE_DURATION, 0, 1) : 0;

  const activeKey = activeKeyAt(time);
  const display = calcDisplay(time);

  const shieldFlash = 0;
  const frameGlow = 0;
  const cyber = 0;

  return (
    <>
      <BackgroundLayer cyber={cyber}/>

      <div style={{
        position: 'absolute', left: '50%', top: 24,
        transform: 'translateX(-50%)',
        zIndex: 5,
      }}>
        <PhoneFrame width={298} height={612} glow={frameGlow}>
          <div style={{ position: 'relative', width: '100%', height: '100%', background: 'transparent' }}>
            {openingOpacity > 0 && (
              <ScreenLayer opacity={openingOpacity} scale={openingScale}>
                <OpeningScreen />
              </ScreenLayer>
            )}
            {privateLineOpacity > 0 && (
              <ScreenLayer opacity={privateLineOpacity} scale={privateLineScale}>
                <LineScreen mode="private"/>
              </ScreenLayer>
            )}
            {iosHomeOpacity > 0 && (
              <ScreenLayer opacity={iosHomeOpacity} scale={iosHomeScale}>
                <IOSHome tapping={iosTapping} tapProgress={iosTapProgress}/>
              </ScreenLayer>
            )}
            {calcOpacity > 0 && (
              <ScreenLayer opacity={calcOpacity} scale={calcScale}>
                <CalcScreen
                  display={display}
                  activeKey={activeKey}
                  acHighlight={false}
                  operator={calcOperator(time)}
                />
              </ScreenLayer>
            )}
            {splashOpacity > 0 && (
              <ScreenLayer opacity={splashOpacity} scale={splashScale}>
                <SplashScreen />
              </ScreenLayer>
            )}
            {devicesOpacity > 0 && (
              <ScreenLayer opacity={devicesOpacity} scale={devicesScale}>
                <DevicesScreen
                  selectedIndex={deviceSelectedIdx}
                  selectProgress={deviceSelectProgress}
                />
              </ScreenLayer>
            )}
            {androidOpacity > 0 && (
              <ScreenLayer opacity={androidOpacity} scale={androidScale}>
                <AndroidHome
                  tapping={androidTapping}
                  tapProgress={androidTapProgress}
                  revealProgress={androidReveal}
                />
              </ScreenLayer>
            )}
            {workLineOpacity > 0 && (
              <ScreenLayer opacity={workLineOpacity} scale={workLineScale}>
                <LineScreen mode="work"/>
              </ScreenLayer>
            )}

            {shieldFlash > 0.05 && (
              <ShieldFlash intensity={shieldFlash}/>
            )}
            <CaptionLayer/>
          </div>
        </PhoneFrame>
      </div>
    </>
  );
}

  const s7Start = T.S7[0];
  const s7End = T.S7[1];
  const s9Start = T.S9[0];

  const renderCaption = (start, end, text, accent = false) => {
    if (time >= start && time <= end) {

    }

  };

  return (
    <div style={{
      position: 'absolute', left: 12, right: 12, bottom: 54,
      zIndex: 110,
      display: 'flex', justifyContent: 'center',
      pointerEvents: 'none',
    }}>
      {renderCaption(scaleTime(4.0), scaleTime(7.8), "普段使いのいつものスマホ")}
      {renderCaption(scaleTime(11.8), scaleTime(15.8), "電卓には秘密がある", true)}
      {renderCaption(scaleTime(18.3), scaleTime(25.8), "電卓画面でパスワード入力", true)}
      {renderCaption(s6Start + scaleTime(0.5), s6End, "スマモ起動")}
