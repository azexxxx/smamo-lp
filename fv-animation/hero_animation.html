<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8"/>
<title>スマモ ヒーローアニメーション</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<meta name="ext-resource-dependency" content="assets/ios-home.jpg" data-resource-id="iosHome" />
<meta name="ext-resource-dependency" content="assets/android-home.jpg" data-resource-id="androidHome" />
<meta name="ext-resource-dependency" content="assets/devices.jpg" data-resource-id="devicesList" />
<template id="__bundler_thumbnail" data-bg-color="transparent">
  <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <rect x="70" y="40" width="60" height="120" rx="12" fill="none" stroke="#5da9ff" stroke-width="3"/>
    <path d="M100 78 L118 86 L118 102 Q118 118 100 128 Q82 118 82 102 L82 86 Z" fill="#1e88ff"/>
    <rect x="94" y="100" width="12" height="12" rx="2" fill="#fff"/>
  </svg>
</template>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: transparent; overflow: hidden; font-family: "Hiragino Sans", "Noto Sans JP", system-ui, sans-serif; }
  @keyframes smamoCaret { 0%, 50% { opacity: 1; } 50.01%, 100% { opacity: 0; } }
  @keyframes smamoSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @keyframes smamoSpinSlow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root" style="position:absolute;inset:0"></div>
<script type="text/babel" src="animations.jsx"></script>
<script type="text/babel" src="scenes/calc-screen.jsx"></script>
<script type="text/babel" src="scenes/ios-home.jsx"></script>
<script type="text/babel" src="scenes/line-screens.jsx"></script>
<script type="text/babel" src="scenes/devices-screen.jsx"></script>
<script type="text/babel" src="scenes/android-home.jsx"></script>
<script type="text/babel" src="scenes/decor.jsx"></script>
<script type="text/babel" src="scenes/security-break.jsx"></script>
<script type="text/babel" src="scenes/timeline.jsx"></script>
<script type="text/babel" data-presets="react">
function mountApp() {
  function App() {
    return (
      <Stage width={390} height={680} duration={18} background="transparent" showControls={false} persistKey="smamo-hero">
        <SmamoTimeline variant="A"/>
      </Stage>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
}
if (document.readyState === 'complete') mountApp();
else window.addEventListener('load', mountApp);
</script>
</body>
</html>
